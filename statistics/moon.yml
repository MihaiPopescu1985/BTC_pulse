tasks:
  sync:
    script: |
      # TODO: verify as it seems not to work
      # ./sync_chain.sh

      source ../.venv/bin/activate

      python src/crawler/query.py
    deps:
      - workspace:workspace-init
    description: Run every time for synchronizing the data (on-chain + price)

  daily-run:
    script: |
      # Clean the console
      echo "Press ENTER to continue."
      read

      # Get the start date
      while true; do
          read -r -p "Enter start date (yyyy-MM-DD): " start
          [[ $start =~ ^[0-9]{4}-0[0-9]|1[0-2]-[0-3][0-9]$ ]] && break
          echo "Only digits allowed."
      done

      # Get the stop date
      while true; do
          read -r -p "Enter end date (yyyy-MM-DD): " end
          [[ $end =~ ^[0-9]{4}-0[0-9]|1[0-2]-[0-3][0-9]$ ]] && break
          echo "Only digits allowed."
      done

      source ../.venv/bin/activate

      python src/util/print_features_range.py \
        $start \
        $end \
        --path out/btc/features.json >> daily_reading.txt

      python src/util/print_features_range.py \
        $start \
        $end \
        --path out/btc/onchain_features.json >> daily_reading.txt

      python src/util/safe_touch_probabilities.py \
        --price-json data/daily_price.json \
        --features-json out/btc/features.json \
        --date $end \
        --days 10 \
        --sims 20000 >> daily_reading.txt

    outputs:
      - daily_readings.txt
    options:
      interactive: true
      cache: false
    description: Generate the data readings based on certain dates which must be introduced.
    # deps:
    #   - sync
