<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BTC SAFE Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0d12;
      --panel: #121822;
      --panel-2: #18202c;
      --border: rgba(255, 255, 255, 0.08);
      --text: #ecf1f8;
      --muted: #9cadc4;
      --accent: #56b6ff;
      --green: #2ecc71;
      --red: #ff5c6c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      height: 100%;
    }

    #sidebar {
      border-right: 1px solid var(--border);
      background: linear-gradient(180deg, #111722, #0e141d);
      padding: 18px 16px;
      overflow: auto;
    }

    #main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .subtle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .section {
      margin-top: 18px;
    }

    .section label,
    .section-title {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #c8d4e7;
      margin-bottom: 8px;
    }

    input[type="text"],
    select,
    button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }

    input[type="text"] {
      padding: 10px 12px;
    }

    select {
      height: 430px;
      padding: 8px;
    }

    button {
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    button:hover {
      background: var(--panel-2);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .button-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .radio-group,
    .tab-group {
      display: grid;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-size: 14px;
      font-weight: 500;
      text-transform: none;
      letter-spacing: normal;
      color: var(--text);
      cursor: pointer;
    }

    .tab-group {
      grid-template-columns: 1fr 1fr;
      padding: 6px;
    }

    .tab-button {
      border-radius: 10px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
    }

    .tab-button.active {
      background: rgba(86, 182, 255, 0.14);
      color: #dff2ff;
      border-color: rgba(86, 182, 255, 0.25);
    }

    #topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }

    #status {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #chartArea {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 14px;
    }

    #charts {
      display: grid;
      gap: 14px;
    }

    .chart-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0.015));
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .chart-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 700;
      color: #d9e5f6;
    }

    .chart {
      width: 100%;
      height: 520px;
    }

    .chart.stacked {
      height: 320px;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 380px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px dashed var(--border);
      border-radius: 16px;
      color: var(--muted);
      text-align: center;
      padding: 24px;
      line-height: 1.5;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(86, 182, 255, 0.12);
      color: #cdeaff;
      font-size: 12px;
      font-weight: 600;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="app">
    <aside id="sidebar">
      <h1 class="title">BTC Dashboard</h1>
      <div class="subtle" id="sidebarDescription">
        ECharts-based viewer for SAFE feature series. The candlestick item is built from
        <code>open/high/low/close</code>.
      </div>

      <div class="section">
        <div class="section-title">Tab</div>
        <div class="tab-group">
          <button id="safeTabButton" class="tab-button active" type="button">SAFE features</button>
          <button id="rawTabButton" class="tab-button" type="button">Raw daily data</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Data Source</div>
        <div class="button-row">
          <button id="reloadButton" type="button">Reload default</button>
          <button id="openFileButton" type="button">Open file</button>
        </div>
        <input id="fileInput" class="hidden" type="file" accept=".csv,text/csv" />
      </div>

      <div class="section">
        <label for="searchInput">Filter series</label>
        <input id="searchInput" type="text" placeholder="Search series..." />
      </div>

      <div class="section">
        <label for="seriesSelect">Series</label>
        <select id="seriesSelect" multiple></select>
        <div class="button-row-3">
          <button id="selectAllButton" type="button">Select all</button>
          <button id="selectVisibleButton" type="button">Select visible</button>
          <button id="clearButton" type="button">Clear</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Layout</div>
        <div class="radio-group">
          <label><input type="radio" name="layout" value="overlay" checked /> Overlay</label>
          <label><input type="radio" name="layout" value="stacked" /> Stacked vertically</label>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Swing Overlay</div>
        <div class="radio-group">
          <label><input id="showSwingsToggle" type="checkbox" checked /> Show swings overlay</label>
          <label><input id="showPivotMarkersToggle" type="checkbox" /> Show pivot markers</label>
        </div>
      </div>

      <div class="section">
        <div class="pill" id="summaryPill">No data loaded</div>
      </div>
    </aside>

    <main id="main">
      <div id="topbar">
        <div class="title" id="mainTitle" style="margin:0; font-size:16px;">Interactive BTC SAFE feature dashboard</div>
        <div id="status">Loading default data...</div>
      </div>
      <div id="chartArea">
        <div id="charts"></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script>
    const DEFAULT_FEATURES_PATH = "../out/features.csv";
    const DEFAULT_SWINGS_PATH = "../out/swing_detection/swings.csv";
    const DEFAULT_DAILY_AMOUNTS_PATH = "../data/daily_amounts.json";
    const DEFAULT_DAILY_TX_SIZE_PATH = "../data/daily_tx_size.json";
    const CANDLESTICK_LABEL = "Candlestick (OHLC)";

    const TAB_CONFIG = {
      safe: {
        title: "Interactive BTC SAFE feature dashboard",
        description: "ECharts-based viewer for SAFE feature series. The candlestick item is built from open/high/low/close.",
        defaultSelection: ["close"],
        allowFileOpen: true,
        buildSeriesNames(payload) {
          return [CANDLESTICK_LABEL, ...Object.keys(payload.series)];
        }
      },
      raw: {
        title: "Interactive BTC raw daily data dashboard",
        description: "Viewer for raw on-chain daily files built from daily_amounts.json and daily_tx_size.json.",
        defaultSelection: ["daily_amount"],
        allowFileOpen: false,
        buildSeriesNames(payload) {
          return Object.keys(payload.series);
        }
      }
    };

    const state = {
      activeTab: "safe",
      charts: [],
      chartGroup: `safe-viewer-${Date.now()}`,
      views: {
        safe: {
          payload: null,
          swings: null,
          swingsAvailable: false,
          sourceLabel: DEFAULT_FEATURES_PATH,
          filteredNames: [],
          allSeriesNames: [],
          selectedNames: new Set(TAB_CONFIG.safe.defaultSelection)
        },
        raw: {
          payload: null,
          sourceLabel: `${DEFAULT_DAILY_AMOUNTS_PATH} + ${DEFAULT_DAILY_TX_SIZE_PATH}`,
          filteredNames: [],
          allSeriesNames: [],
          selectedNames: new Set(TAB_CONFIG.raw.defaultSelection)
        }
      }
    };

    const statusEl = document.getElementById("status");
    const summaryPillEl = document.getElementById("summaryPill");
    const searchInputEl = document.getElementById("searchInput");
    const seriesSelectEl = document.getElementById("seriesSelect");
    const chartsEl = document.getElementById("charts");
    const fileInputEl = document.getElementById("fileInput");
    const openFileButtonEl = document.getElementById("openFileButton");
    const sidebarDescriptionEl = document.getElementById("sidebarDescription");
    const mainTitleEl = document.getElementById("mainTitle");
    const safeTabButtonEl = document.getElementById("safeTabButton");
    const rawTabButtonEl = document.getElementById("rawTabButton");
    const showSwingsToggleEl = document.getElementById("showSwingsToggle");
    const showPivotMarkersToggleEl = document.getElementById("showPivotMarkersToggle");

    function currentView() {
      return state.views[state.activeTab];
    }

    function currentTabConfig() {
      return TAB_CONFIG[state.activeTab];
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setSummary(text) {
      summaryPillEl.textContent = text;
    }

    function validateFeaturesPayload(payload) {
      if (!payload || !Array.isArray(payload.dates) || typeof payload.series !== "object" || payload.series === null) {
        throw new Error("features.csv must produce 'dates' and 'series'.");
      }
      const datesLength = payload.dates.length;
      for (const [name, values] of Object.entries(payload.series)) {
        if (!Array.isArray(values)) {
          throw new Error(`Series '${name}' is not an array.`);
        }
        if (values.length !== datesLength) {
          throw new Error(`Series '${name}' length mismatch: expected ${datesLength}, got ${values.length}.`);
        }
      }
      const requiredOhlc = ["open", "high", "low", "close"];
      const missingOhlc = requiredOhlc.filter((name) => !(name in payload.series));
      if (missingOhlc.length) {
        throw new Error(`features.csv is missing OHLC series required for candlesticks: ${missingOhlc.join(", ")}`);
      }
    }

    function validateGenericPayload(payload, sourceName) {
      if (!payload || !Array.isArray(payload.dates) || typeof payload.series !== "object" || payload.series === null) {
        throw new Error(`${sourceName} must contain 'dates' and 'series'.`);
      }
      const datesLength = payload.dates.length;
      for (const [name, values] of Object.entries(payload.series)) {
        if (!Array.isArray(values)) {
          throw new Error(`Series '${name}' is not an array.`);
        }
        if (values.length !== datesLength) {
          throw new Error(`Series '${name}' length mismatch: expected ${datesLength}, got ${values.length}.`);
        }
      }
    }

    function validateSwingsRows(rows, sourceName) {
      if (!Array.isArray(rows)) {
        throw new Error(`${sourceName} must parse into row objects.`);
      }
      const required = ["start_date", "end_date", "direction", "amplitude_pct", "duration_days"];
      for (const [index, row] of rows.entries()) {
        for (const field of required) {
          if (!(field in row)) {
            throw new Error(`${sourceName} row ${index + 1} is missing '${field}'.`);
          }
        }
      }
    }

    function normalizeNumberArray(values) {
      return values.map((value) => {
        if (value == null || value === "") return null;
        const num = Number(value);
        return Number.isFinite(num) ? num : null;
      });
    }

    async function fetchJson(path) {
      const response = await fetch(path, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Failed to load ${path}: ${response.status} ${response.statusText}`);
      }
      return response.json();
    }

    async function fetchText(path) {
      const response = await fetch(path, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Failed to load ${path}: ${response.status} ${response.statusText}`);
      }
      return response.text();
    }

    function parseCsvLine(line) {
      const out = [];
      let current = "";
      let inQuotes = false;

      for (let index = 0; index < line.length; index += 1) {
        const char = line[index];
        if (char === '"') {
          if (inQuotes && line[index + 1] === '"') {
            current += '"';
            index += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          out.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      out.push(current);
      return out;
    }

    function parseFeatureCsvText(text, sourceName) {
      const normalized = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
      const lines = normalized.split("\n").filter((line) => line.trim().length > 0);
      if (lines.length < 2) {
        throw new Error(`${sourceName} must contain a header row and at least one data row.`);
      }

      const header = parseCsvLine(lines[0]).map((value) => value.trim());
      if (!header.length || header[0] !== "date") {
        throw new Error(`${sourceName} must start with a 'date' column.`);
      }

      const dates = [];
      const series = {};
      for (const columnName of header.slice(1)) {
        series[columnName] = [];
      }

      for (const line of lines.slice(1)) {
        const fields = parseCsvLine(line);
        if (fields.length !== header.length) {
          throw new Error(`${sourceName} row has ${fields.length} fields but expected ${header.length}.`);
        }

        dates.push(fields[0].trim());
        for (let columnIndex = 1; columnIndex < header.length; columnIndex += 1) {
          const rawValue = fields[columnIndex];
          series[header[columnIndex]].push(rawValue === "" ? null : rawValue);
        }
      }

      const payload = { dates, series };
      validateFeaturesPayload(payload);
      return payload;
    }

    function parseRowCsvText(text, sourceName) {
      const normalized = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
      const lines = normalized.split("\n").filter((line) => line.trim().length > 0);
      if (lines.length < 2) {
        throw new Error(`${sourceName} must contain a header row and at least one data row.`);
      }
      const header = parseCsvLine(lines[0]).map((value) => value.trim());
      const rows = [];
      for (const line of lines.slice(1)) {
        const fields = parseCsvLine(line);
        if (fields.length !== header.length) {
          throw new Error(`${sourceName} row has ${fields.length} fields but expected ${header.length}.`);
        }
        const row = {};
        for (let index = 0; index < header.length; index += 1) {
          row[header[index]] = fields[index].trim();
        }
        rows.push(row);
      }
      return rows;
    }

    function parseSwingsCsvText(text, sourceName) {
      const rows = parseRowCsvText(text, sourceName).map((row) => ({
        start_date: row.start_date,
        end_date: row.end_date,
        direction: row.direction,
        amplitude_pct: row.amplitude_pct === "" ? null : Number(row.amplitude_pct),
        duration_days: row.duration_days === "" ? null : Number(row.duration_days)
      }));
      validateSwingsRows(rows, sourceName);
      return rows;
    }

    async function loadDefaultSafePayload() {
      const csvText = await fetchText(DEFAULT_FEATURES_PATH);
      const payload = parseFeatureCsvText(csvText, DEFAULT_FEATURES_PATH);
      validateFeaturesPayload(payload);
      state.views.safe.sourceLabel = DEFAULT_FEATURES_PATH;
      return payload;
    }

    async function loadDefaultSwings() {
      try {
        const csvText = await fetchText(DEFAULT_SWINGS_PATH);
        const rows = parseSwingsCsvText(csvText, DEFAULT_SWINGS_PATH);
        state.views.safe.swingsAvailable = true;
        return rows;
      } catch (error) {
        state.views.safe.swingsAvailable = false;
        return null;
      }
    }

    async function loadDefaultRawPayload() {
      const [amountsPayload, txSizePayload] = await Promise.all([
        fetchJson(DEFAULT_DAILY_AMOUNTS_PATH),
        fetchJson(DEFAULT_DAILY_TX_SIZE_PATH)
      ]);

      if (typeof amountsPayload !== "object" || amountsPayload === null || Array.isArray(amountsPayload)) {
        throw new Error(`${DEFAULT_DAILY_AMOUNTS_PATH} must contain a date-to-value object.`);
      }
      if (!Array.isArray(txSizePayload) || txSizePayload.length < 2 || !Array.isArray(txSizePayload[0]) || txSizePayload[0][0] !== "date") {
        throw new Error(`${DEFAULT_DAILY_TX_SIZE_PATH} must contain a header row starting with 'date'.`);
      }

      const dates = new Set(Object.keys(amountsPayload));
      for (const row of txSizePayload.slice(1)) {
        if (Array.isArray(row) && row.length) {
          dates.add(String(row[0]));
        }
      }

      const sortedDates = Array.from(dates).sort();
      const series = { daily_amount: sortedDates.map((date) => amountsPayload[date] ?? null) };

      const header = txSizePayload[0];
      const txByDate = new Map();
      for (const row of txSizePayload.slice(1)) {
        if (Array.isArray(row) && row.length === header.length) {
          txByDate.set(String(row[0]), row.slice(1));
        }
      }

      for (let columnIndex = 1; columnIndex < header.length; columnIndex += 1) {
        const columnName = String(header[columnIndex]);
        series[columnName] = sortedDates.map((date) => {
          const row = txByDate.get(date);
          return row ? row[columnIndex - 1] : null;
        });
      }

      const payload = { dates: sortedDates, series };
      validateGenericPayload(payload, "raw daily payload");
      state.views.raw.sourceLabel = `${DEFAULT_DAILY_AMOUNTS_PATH} + ${DEFAULT_DAILY_TX_SIZE_PATH}`;
      return payload;
    }

    async function loadSafePayloadFromFile(file) {
      const text = await file.text();
      const payload = parseFeatureCsvText(text, file.name);
      validateFeaturesPayload(payload);
      state.views.safe.sourceLabel = file.name;
      return payload;
    }

    function syncUiForTab() {
      const cfg = currentTabConfig();
      sidebarDescriptionEl.textContent = cfg.description;
      mainTitleEl.textContent = cfg.title;
      openFileButtonEl.classList.toggle("hidden", !cfg.allowFileOpen);
      safeTabButtonEl.classList.toggle("active", state.activeTab === "safe");
      rawTabButtonEl.classList.toggle("active", state.activeTab === "raw");
    }

    function syncSeriesList(filterText = "") {
      const view = currentView();
      const query = filterText.trim().toLowerCase();
      view.filteredNames = view.allSeriesNames.filter((name) => name.toLowerCase().includes(query));

      seriesSelectEl.innerHTML = "";
      for (const name of view.filteredNames) {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        if (view.selectedNames.has(name)) {
          option.selected = true;
        }
        seriesSelectEl.appendChild(option);
      }

      if (!view.selectedNames.size && seriesSelectEl.options.length) {
        for (const option of seriesSelectEl.options) {
          if (currentTabConfig().defaultSelection.includes(option.value)) {
            option.selected = true;
            view.selectedNames.add(option.value);
          }
        }
      }
    }

    function getSelectedSeries() {
      const view = currentView();
      return view.allSeriesNames.filter((name) => view.selectedNames.has(name));
    }

    function syncSelectedNamesFromList() {
      const view = currentView();
      const visibleNames = new Set(view.filteredNames);
      for (const name of visibleNames) {
        view.selectedNames.delete(name);
      }
      for (const option of seriesSelectEl.selectedOptions) {
        view.selectedNames.add(option.value);
      }
    }

    function disposeCharts() {
      for (const chart of state.charts) {
        chart.dispose();
      }
      state.charts = [];
      echarts.disconnect(state.chartGroup);
    }

    function candlestickData(payload) {
      const open = normalizeNumberArray(payload.series.open);
      const high = normalizeNumberArray(payload.series.high);
      const low = normalizeNumberArray(payload.series.low);
      const close = normalizeNumberArray(payload.series.close);
      return payload.dates.map((_, index) => [open[index], close[index], low[index], high[index]]);
    }

    function buildLineSeries(name, payload, axisIndex = 0) {
      return {
        name,
        type: "line",
        data: normalizeNumberArray(payload.series[name]),
        yAxisIndex: axisIndex,
        showSymbol: false,
        smooth: false,
        connectNulls: false,
        lineStyle: { width: 1.7 },
        emphasis: { focus: "series" }
      };
    }

    function buildCandlestickSeries(payload) {
      return {
        name: CANDLESTICK_LABEL,
        type: "candlestick",
        data: candlestickData(payload),
        itemStyle: {
          color: "#2ecc71",
          color0: "#ff5c6c",
          borderColor: "#2ecc71",
          borderColor0: "#ff5c6c"
        },
        emphasis: { focus: "series" }
      };
    }

    function buildSwingOverlaySeries(payload, swings, showPivotMarkers) {
      if (!Array.isArray(swings) || !swings.length) {
        return [];
      }

      const highs = normalizeNumberArray(payload.series.high);
      const lows = normalizeNumberArray(payload.series.low);
      const dateToIndex = new Map(payload.dates.map((date, index) => [date, index]));
      const upSegments = [];
      const downSegments = [];
      const upPivots = [];
      const downPivots = [];

      for (const swing of swings) {
        const startIndex = dateToIndex.get(swing.start_date);
        const endIndex = dateToIndex.get(swing.end_date);
        if (startIndex == null || endIndex == null) {
          continue;
        }

        const isUp = swing.direction === "up";
        const startPrice = isUp ? lows[startIndex] : highs[startIndex];
        const endPrice = isUp ? highs[endIndex] : lows[endIndex];
        if (startPrice == null || endPrice == null) {
          continue;
        }

        const segment = [[swing.start_date, startPrice], [swing.end_date, endPrice], null];
        if (isUp) {
          upSegments.push(...segment);
          if (showPivotMarkers) {
            upPivots.push([swing.start_date, startPrice], [swing.end_date, endPrice]);
          }
        } else {
          downSegments.push(...segment);
          if (showPivotMarkers) {
            downPivots.push([swing.start_date, startPrice], [swing.end_date, endPrice]);
          }
        }
      }

      const series = [];
      if (upSegments.length) {
        series.push({
          name: "Swings up",
          type: "line",
          yAxisIndex: 0,
          data: upSegments,
          showSymbol: false,
          connectNulls: false,
          lineStyle: { width: 1.6, color: "#7ff0a5", opacity: 0.95 },
          emphasis: { focus: "series" },
          z: 8
        });
      }
      if (downSegments.length) {
        series.push({
          name: "Swings down",
          type: "line",
          yAxisIndex: 0,
          data: downSegments,
          showSymbol: false,
          connectNulls: false,
          lineStyle: { width: 1.6, color: "#ff8a96", opacity: 0.95 },
          emphasis: { focus: "series" },
          z: 8
        });
      }
      if (showPivotMarkers && upPivots.length) {
        series.push({
          name: "Up pivots",
          type: "scatter",
          yAxisIndex: 0,
          data: upPivots,
          symbol: "circle",
          symbolSize: 5,
          itemStyle: { color: "#7ff0a5", opacity: 0.95 },
          tooltip: { show: false },
          z: 9
        });
      }
      if (showPivotMarkers && downPivots.length) {
        series.push({
          name: "Down pivots",
          type: "scatter",
          yAxisIndex: 0,
          data: downPivots,
          symbol: "diamond",
          symbolSize: 5,
          itemStyle: { color: "#ff8a96", opacity: 0.95 },
          tooltip: { show: false },
          z: 9
        });
      }
      return series;
    }

    function shouldShowSwingOverlay(selected) {
      return (
        state.activeTab === "safe" &&
        selected.includes(CANDLESTICK_LABEL) &&
        showSwingsToggleEl.checked &&
        Array.isArray(state.views.safe.swings) &&
        state.views.safe.swings.length > 0
      );
    }

    function createCommonOptionBase(title, payload) {
      return {
        animation: false,
        backgroundColor: "transparent",
        title: {
          text: title,
          left: 14,
          top: 10,
          textStyle: {
            color: "#e9f0fb",
            fontSize: 13,
            fontWeight: 700
          }
        },
        legend: {
          top: 10,
          right: 16,
          textStyle: { color: "#d0dbed" }
        },
        tooltip: {
          trigger: "axis",
          axisPointer: { type: "cross" },
          backgroundColor: "rgba(10, 14, 20, 0.96)",
          borderColor: "rgba(255,255,255,0.12)",
          textStyle: { color: "#eff6ff" }
        },
        grid: {
          left: 56,
          right: 28,
          top: 56,
          bottom: 76
        },
        xAxis: {
          type: "category",
          data: payload.dates,
          boundaryGap: true,
          axisLine: { lineStyle: { color: "#5b6b82" } },
          axisLabel: { color: "#c3cfe2" }
        },
        yAxis: {
          type: "value",
          scale: true,
          axisLine: { lineStyle: { color: "#5b6b82" } },
          splitLine: { lineStyle: { color: "rgba(255,255,255,0.08)" } },
          axisLabel: { color: "#c3cfe2" }
        },
        dataZoom: [
          {
            type: "inside",
            xAxisIndex: [0],
            filterMode: "filter"
          },
          {
            type: "slider",
            xAxisIndex: [0],
            filterMode: "filter",
            bottom: 22,
            height: 28,
            borderColor: "rgba(255,255,255,0.08)",
            backgroundColor: "rgba(255,255,255,0.04)",
            fillerColor: "rgba(86, 182, 255, 0.22)",
            moveHandleStyle: { color: "#88cdfd" }
          }
        ],
        toolbox: {
          right: 16,
          bottom: 18,
          iconStyle: { borderColor: "#cbd7ea" },
          feature: {
            dataZoom: { yAxisIndex: "none" },
            restore: {},
            saveAsImage: {}
          }
        }
      };
    }

    function buildOverlayOption(selected, payload) {
      const option = createCommonOptionBase("Overlay", payload);
      const includesCandlestick = state.activeTab === "safe" && selected.includes(CANDLESTICK_LABEL);
      const lineNames = selected.filter((name) => name !== CANDLESTICK_LABEL);
      const priceScaleSeries = new Set(["open", "high", "low", "close"]);

      option.series = [];
      if (includesCandlestick) {
        option.series.push(buildCandlestickSeries(payload));
      }

      if (includesCandlestick && lineNames.some((name) => !priceScaleSeries.has(name))) {
        option.yAxis = [
          option.yAxis,
          {
            type: "value",
            scale: true,
            position: "right",
            axisLine: { lineStyle: { color: "#5b6b82" } },
            splitLine: { show: false },
            axisLabel: { color: "#c3cfe2" }
          }
        ];
      }

      for (const name of lineNames) {
        const yAxisIndex = includesCandlestick && !priceScaleSeries.has(name) ? 1 : 0;
        option.series.push(buildLineSeries(name, payload, yAxisIndex));
      }

      if (includesCandlestick && shouldShowSwingOverlay(selected)) {
        option.series.push(...buildSwingOverlaySeries(payload, state.views.safe.swings, showPivotMarkersToggleEl.checked));
      }

      return option;
    }

    function buildSingleSeriesOption(name, payload) {
      const option = createCommonOptionBase(name, payload);
      option.legend = { show: false };
      option.series = state.activeTab === "safe" && name === CANDLESTICK_LABEL
        ? [buildCandlestickSeries(payload)]
        : [buildLineSeries(name, payload)];
      if (state.activeTab === "safe" && name === CANDLESTICK_LABEL && shouldShowSwingOverlay([CANDLESTICK_LABEL])) {
        option.series.push(...buildSwingOverlaySeries(payload, state.views.safe.swings, showPivotMarkersToggleEl.checked));
      }
      return option;
    }

    function createChartCard(title, stacked = false) {
      const card = document.createElement("section");
      card.className = "chart-card";

      const header = document.createElement("div");
      header.className = "chart-header";
      header.textContent = title;
      card.appendChild(header);

      const chartDiv = document.createElement("div");
      chartDiv.className = `chart${stacked ? " stacked" : ""}`;
      card.appendChild(chartDiv);

      chartsEl.appendChild(card);
      return chartDiv;
    }

    function renderCharts() {
      disposeCharts();
      chartsEl.innerHTML = "";

      const view = currentView();
      if (!view.payload) {
        chartsEl.innerHTML = `<div class="empty">No data loaded.</div>`;
        return;
      }

      const selected = getSelectedSeries();
      if (!selected.length) {
        chartsEl.innerHTML = `<div class="empty">Select one or more series from the list to render charts.</div>`;
        setStatus("No series selected");
        setSummary(`${view.payload.dates.length} rows loaded`);
        return;
      }

      const layout = document.querySelector('input[name="layout"]:checked').value;
      const chartTargets = [];

      if (layout === "overlay") {
        chartTargets.push({
          element: createChartCard("Overlay", false),
          option: buildOverlayOption(selected, view.payload)
        });
      } else {
        for (const name of selected) {
          chartTargets.push({
            element: createChartCard(name, true),
            option: buildSingleSeriesOption(name, view.payload)
          });
        }
      }

      for (const target of chartTargets) {
        const chart = echarts.init(target.element, null, { renderer: "canvas" });
        chart.group = state.chartGroup;
        chart.setOption(target.option, true);
        state.charts.push(chart);
      }

      if (state.charts.length > 1) {
        echarts.connect(state.chartGroup);
      }

      setStatus(`Showing ${selected.length} item(s) in ${layout} layout from ${view.sourceLabel}`);
      const swingsLabel = state.activeTab === "safe"
        ? (view.swingsAvailable ? (showSwingsToggleEl.checked ? " · swings on" : " · swings loaded") : " · swings unavailable")
        : "";
      setSummary(`${view.payload.dates.length} rows · ${Object.keys(view.payload.series).length} series${swingsLabel}`);
    }

    async function initializeDefaults() {
      setStatus("Loading default data...");
      try {
        const [safePayload, rawPayload] = await Promise.all([
          loadDefaultSafePayload(),
          loadDefaultRawPayload()
        ]);
        const swings = await loadDefaultSwings();

        state.views.safe.payload = safePayload;
        state.views.safe.swings = swings;
        state.views.safe.allSeriesNames = TAB_CONFIG.safe.buildSeriesNames(safePayload);
        state.views.safe.selectedNames = new Set(
          TAB_CONFIG.safe.defaultSelection.filter((name) => state.views.safe.allSeriesNames.includes(name))
        );

        state.views.raw.payload = rawPayload;
        state.views.raw.allSeriesNames = TAB_CONFIG.raw.buildSeriesNames(rawPayload);
        state.views.raw.selectedNames = new Set(
          TAB_CONFIG.raw.defaultSelection.filter((name) => state.views.raw.allSeriesNames.includes(name))
        );

        syncUiForTab();
        syncSeriesList(searchInputEl.value);
        renderCharts();
      } catch (error) {
        chartsEl.innerHTML = `
          <div class="empty">
            <div>
              <strong>Could not load the default dashboard data.</strong><br />
              ${error.message}<br /><br />
              If you opened this page directly via <code>file://</code>, serve the repository with a local HTTP server
              or use the SAFE tab's <strong>Open file</strong> button for features.csv.
            </div>
          </div>`;
        setStatus(error.message);
        setSummary("Load failed");
      }
    }

    async function openSelectedSafeFile(file) {
      try {
        const payload = await loadSafePayloadFromFile(file);
        state.views.safe.payload = payload;
        if (state.views.safe.swings === null) {
          state.views.safe.swings = await loadDefaultSwings();
        }
        state.views.safe.allSeriesNames = TAB_CONFIG.safe.buildSeriesNames(payload);
        state.views.safe.selectedNames = new Set(
          TAB_CONFIG.safe.defaultSelection.filter((name) => state.views.safe.allSeriesNames.includes(name))
        );
        if (state.activeTab === "safe") {
          syncSeriesList(searchInputEl.value);
          renderCharts();
        }
      } catch (error) {
        setStatus(error.message);
        setSummary("Load failed");
        alert(error.message);
      }
    }

    function switchTab(tabName) {
      state.activeTab = tabName;
      syncUiForTab();
      syncSeriesList(searchInputEl.value);
      renderCharts();
    }

    document.getElementById("reloadButton").addEventListener("click", initializeDefaults);
    openFileButtonEl.addEventListener("click", () => {
      if (state.activeTab === "safe") {
        fileInputEl.click();
      }
    });

    safeTabButtonEl.addEventListener("click", () => switchTab("safe"));
    rawTabButtonEl.addEventListener("click", () => switchTab("raw"));

    document.getElementById("selectAllButton").addEventListener("click", () => {
      const view = currentView();
      view.selectedNames = new Set(view.allSeriesNames);
      syncSeriesList(searchInputEl.value);
      renderCharts();
    });

    document.getElementById("selectVisibleButton").addEventListener("click", () => {
      const view = currentView();
      for (const name of view.filteredNames) {
        view.selectedNames.add(name);
      }
      syncSeriesList(searchInputEl.value);
      renderCharts();
    });

    document.getElementById("clearButton").addEventListener("click", () => {
      currentView().selectedNames.clear();
      syncSeriesList(searchInputEl.value);
      renderCharts();
    });

    searchInputEl.addEventListener("input", () => {
      syncSeriesList(searchInputEl.value);
      renderCharts();
    });

    seriesSelectEl.addEventListener("change", () => {
      syncSelectedNamesFromList();
      renderCharts();
    });

    fileInputEl.addEventListener("change", async (event) => {
      const [file] = event.target.files || [];
      if (file) {
        await openSelectedSafeFile(file);
      }
      event.target.value = "";
    });

    for (const radio of document.querySelectorAll('input[name="layout"]')) {
      radio.addEventListener("change", renderCharts);
    }

    showSwingsToggleEl.addEventListener("change", renderCharts);
    showPivotMarkersToggleEl.addEventListener("change", renderCharts);

    window.addEventListener("resize", () => {
      for (const chart of state.charts) {
        chart.resize();
      }
    });

    syncUiForTab();
    initializeDefaults();
  </script>
</body>

</html>
